name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------
  # ANDROID BUILD (Universal + Splits)
  # ---------------------------------------------------
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get

      - name: Decode Keystore (if secrets available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create key.properties (if secrets available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "storeFile=upload-keystore.jks" > key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> key.properties

      - name: Build Universal APK (obfuscated)
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename Universal APK
        run: mv build/app/outputs/flutter-apk/app-release.apk app-Universal.apk

      - name: Build Split APKs (obfuscated)
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info

      - name: Rename Split APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk app-Android-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk app-Android-armv7.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk app-Android-x86.apk

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename App Bundle
        run: mv build/app/outputs/bundle/release/app-release.aab app-Android.aab

      - name: Upload Debug Info (for crash de-obfuscation)
        run: tar -czf debug-info.tar.gz -C build debug-info

      - uses: actions/upload-artifact@v4
        with:
          name: Android-Builds
          path: |
            app-*.apk
            app-Android.aab
            debug-info.tar.gz

  # ---------------------------------------------------
  # iOS BUILD (Signed IPA, fallback to unsigned .zip)
  # ---------------------------------------------------
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get

      # --- Try signed IPA build ---
      - name: Install iOS Signing Certificate
        if: ${{ secrets.P12_BASE64 != '' }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$P12_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build Signed IPA
        if: ${{ secrets.P12_BASE64 != '' }}
        run: flutter build ipa --release --export-options-plist=ios/Runner/ExportOptions.plist --obfuscate --split-debug-info=build/debug-info

      - name: Rename IPA
        if: ${{ secrets.P12_BASE64 != '' }}
        run: mv build/ios/ipa/*.ipa app-iOS.ipa

      - name: Upload iOS Debug Info
        if: ${{ secrets.P12_BASE64 != '' }}
        run: tar -czf ios-debug-info.tar.gz -C build debug-info

      - name: Cleanup Keychain
        if: ${{ always() && secrets.P12_BASE64 != '' }}
        run: |
          security delete-keychain build.keychain
          rm -f certificate.p12 profile.mobileprovision

      # --- Fallback: unsigned build ---
      - name: Build iOS (unsigned fallback)
        if: ${{ secrets.P12_BASE64 == '' }}
        run: flutter build ios --release --no-codesign

      - name: Compress unsigned iOS build
        if: ${{ secrets.P12_BASE64 == '' }}
        run: zip -r app-iOS-unsigned.zip build/ios

      - uses: actions/upload-artifact@v4
        with:
          name: iOS-Build
          if-no-files-found: ignore
          path: |
            app-iOS.ipa
            app-iOS-unsigned.zip
            ios-debug-info.tar.gz

  # ---------------------------------------------------
  # LINUX BUILD
  # ---------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Build Linux
        run: flutter build linux --release

      - name: Compress Linux Build
        run: tar -czf app-Linux.tar.gz -C build/linux/x64/release bundle

      - uses: actions/upload-artifact@v4
        with:
          name: Linux-Build
          path: app-Linux.tar.gz

  # ---------------------------------------------------
  # WINDOWS BUILD
  # ---------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Compress Windows Build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath app-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: app-Windows.zip

  # ---------------------------------------------------
  # WEB BUILD
  # ---------------------------------------------------
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Compress Web Build
        run: |
          cd build/web && zip -r ../../app-Web.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: Web-Build
          path: app-Web.zip

  # ---------------------------------------------------
  # AUTOMATIC RELEASE
  # ---------------------------------------------------
  create-release:
    needs: [build-android, build-ios, build-linux, build-windows, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Version from Pubspec
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
            echo "No version set in pubspec.yaml, defaulting to $VERSION"
          fi
          echo "Detected Version: $VERSION"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download all Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts

      - name: Move artifacts to root
        run: |
          mv all_artifacts/Android-Builds/*.apk . 2>/dev/null || true
          mv all_artifacts/Android-Builds/*.aab . 2>/dev/null || true
          mv all_artifacts/Android-Builds/*.tar.gz . 2>/dev/null || true
          mv all_artifacts/iOS-Build/*.ipa . 2>/dev/null || true
          mv all_artifacts/iOS-Build/*.zip . 2>/dev/null || true
          mv all_artifacts/iOS-Build/*.tar.gz . 2>/dev/null || true
          mv all_artifacts/Linux-Build/*.tar.gz .
          mv all_artifacts/Windows-Build/*.zip .
          mv all_artifacts/Web-Build/*.zip .

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Release v${{ env.APP_VERSION }}
          files: |
            *.apk
            *.aab
            *.ipa
            *.zip
            *.tar.gz
          draft: false
          prerelease: false
